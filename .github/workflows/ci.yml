name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Static checks and smoke tests (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Compile all Python files
        run: uv run python -m compileall -q pm_copilot_engine tests

      - name: Run smoke tests
        run: uv run pytest tests/ -v

      - name: Validate pyproject.toml
        run: uv run python -c "import tomllib; tomllib.load(open('pyproject.toml', 'rb'))"
