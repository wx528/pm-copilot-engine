name: Integration

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: "OpenAI-compatible base URL"
        required: false
        default: ""
      model:
        description: "Model name"
        required: false
        default: ""
      provider:
        description: "Provider hint (optional)"
        required: false
        default: ""
  schedule:
    # Weekly on Monday at 06:00 UTC.
    - cron: "0 6 * * 1"

jobs:
  real-model:
    name: Real model smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Run integration tests
        env:
          PMCE_API_KEY: ${{ secrets.PMCE_API_KEY }}
          PMCE_BASE_URL: ${{ github.event.inputs.base_url || secrets.PMCE_BASE_URL || 'https://api.openai.com/v1' }}
          PMCE_MODEL: ${{ github.event.inputs.model || secrets.PMCE_MODEL || 'gpt-4o-mini' }}
          PMCE_PROVIDER: ${{ github.event.inputs.provider || secrets.PMCE_PROVIDER || '' }}
        run: uv run pytest tests/ -m integration -v
